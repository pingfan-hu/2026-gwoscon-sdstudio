<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

@font-face {
  font-family: 'TsangerJinKai';
  src: url('https://raw.githubusercontent.com/pingfan-hu/resources/main/fonts/TsangerJinKai02-W04.ttf') format('truetype');
}

body {
  background: transparent;
  font-family: 'TsangerJinKai', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 16px;
  overflow: hidden;
}

.container {
  display: flex;
  align-items: stretch;
  background: #FFFFFF;
  border: 2px solid #D0D0D0;
  border-radius: 14px;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

.img-panel {
  width: 72%;
  flex-shrink: 0;
  overflow: hidden;
}
.img-panel img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
}

.divider {
  width: 1.5px;
  background: #D0D0D0;
  flex-shrink: 0;
  align-self: stretch;
  margin: 20px 0;
}

.list-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 24px;
  padding: 24px 20px;
}

.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1.5em;
  color: #564232;
  line-height: 1.3;
  white-space: nowrap;
}
.list-item svg {
  width: 22px;
  height: 22px;
  stroke: #D45F47;
  stroke-width: 2.5;
  flex-shrink: 0;
}
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
