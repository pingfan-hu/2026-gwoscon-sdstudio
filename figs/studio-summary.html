<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

@font-face {
  font-family: 'TsangerJinKai';
  src: url('https://raw.githubusercontent.com/pingfan-hu/resources/main/fonts/TsangerJinKai02-W04.ttf') format('truetype');
}

body {
  background: transparent;
  font-family: 'TsangerJinKai', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 16px;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  background: #F8F7F0;
  border: 2px solid #5654A2;
  border-radius: 14px;
  padding: 24px;
  width: 100%;
}

.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px 12px;
  border-radius: 10px;
  border: 2px solid transparent;
  gap: 8px;
  cursor: pointer;
  transition: background 0.18s, border-color 0.18s, transform 0.18s;
  will-change: transform;
  user-select: none;
}
.card:hover { transform: translateY(-3px); }

.card svg { width: 48px; height: 48px; stroke-width: 1.5; transform: translateZ(0); transition: stroke 0.18s; }

.card-title {
  font-size: 1.15em;
  font-weight: 700;
  color: #564232;
  line-height: 1.3;
}

/* Color variants */
.amber  { background: rgba(255,184,77,0.12);  border-color: rgba(255,184,77,0.4); }
.amber  svg { stroke: #C4881A; }
.amber:hover  { background: rgba(255,184,77,0.25); border-color: #FFB84D; }

.teal   { background: rgba(44,132,117,0.10);  border-color: rgba(44,132,117,0.4); }
.teal   svg { stroke: #2C8475; }
.teal:hover   { background: rgba(44,132,117,0.22); border-color: #2C8475; }

.blue   { background: rgba(58,125,201,0.10);  border-color: rgba(58,125,201,0.4); }
.blue   svg { stroke: #3A7DC9; }
.blue:hover   { background: rgba(58,125,201,0.22); border-color: #3A7DC9; }

.purple { background: rgba(86,84,162,0.10);   border-color: rgba(86,84,162,0.4); }
.purple svg { stroke: #5654A2; }
.purple:hover { background: rgba(86,84,162,0.20); border-color: #5654A2; }

.coral  { background: rgba(212,95,71,0.10);   border-color: rgba(212,95,71,0.4); }
.coral  svg { stroke: #D45F47; }
.coral:hover  { background: rgba(212,95,71,0.20); border-color: #D45F47; }

.slate  { background: rgba(90,107,128,0.10);  border-color: rgba(90,107,128,0.4); }
.slate  svg { stroke: #5A6B80; }
.slate:hover  { background: rgba(90,107,128,0.20); border-color: #5A6B80; }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<div class="container">

  <div class="card amber">
    <i data-lucide="layout-panel-left"></i>
    <div class="card-title">GUI for Survey Editing</div>
  </div>

  <div class="card teal">
    <i data-lucide="eye"></i>
    <div class="card-title">Live Preview</div>
  </div>

  <div class="card blue">
    <i data-lucide="bar-chart-2"></i>
    <div class="card-title">Response Dashboard</div>
  </div>

  <div class="card purple">
    <i data-lucide="database"></i>
    <div class="card-title">SQL Connection</div>
  </div>

  <div class="card coral">
    <i data-lucide="download"></i>
    <div class="card-title">Data View & Download</div>
  </div>

  <div class="card slate">
    <i data-lucide="sparkles"></i>
    <div class="card-title">...and more!</div>
  </div>

</div>

<script>
lucide.createIcons();
</script>
</body>
</html>
