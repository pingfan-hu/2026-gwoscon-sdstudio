<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

@font-face {
  font-family: 'TsangerJinKai';
  src: url('https://raw.githubusercontent.com/pingfan-hu/resources/main/fonts/TsangerJinKai02-W04.ttf') format('truetype');
}

body {
  background: transparent;
  font-family: 'TsangerJinKai', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 16px;
  overflow: hidden;
}

.container {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #FFFFFF;
  border: 2px solid #5654A2;
  border-radius: 14px;
  padding: 28px 36px;
  width: 100%;
  gap: 16px;
}

.logo-item {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  cursor: pointer;
  border-radius: 10px;
  padding: 6px;
  transition: transform 0.18s, background 0.18s;
  will-change: transform;
  backface-visibility: hidden;
  user-select: none;
}

.logo-item img {
  width: 120px;
  height: 120px;
  object-fit: contain;
  pointer-events: none;
}

.logo-item:hover {
  transform: translateY(-4px);
  background: rgba(86, 84, 162, 0.07);
}

.logo-item.active {
  transform: translateY(-2px) scale(0.96);
  background: rgba(86, 84, 162, 0.13);
}

.operator {
  font-size: 2.4em;
  font-weight: 700;
  color: #5654A2;
  flex-shrink: 0;
  line-height: 1;
}

.result-wrap {
  min-width: 360px;
  flex: 1;
  border-radius: 18px;
  border: 2px solid #D0D0D0;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  will-change: transform;
  backface-visibility: hidden;
  user-select: none;
}

.result-wrap img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 16px;
  pointer-events: none;
}

.result-wrap:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(86, 84, 162, 0.15);
  border-color: #5654A2;
}

.result-wrap.active {
  transform: translateY(-2px) scale(0.98);
  box-shadow: 0 4px 12px rgba(86, 84, 162, 0.12);
}
</style>
</head>

<script>
const clickables = document.querySelectorAll('.logo-item, .result-wrap');

clickables.forEach(el => {
  el.addEventListener('click', e => {
    e.stopPropagation();
    const isActive = el.classList.contains('active');
    clickables.forEach(x => x.classList.remove('active'));
    if (!isActive) el.classList.add('active');
  });
});

document.addEventListener('click', () => {
  clickables.forEach(el => el.classList.remove('active'));
});
</script>
