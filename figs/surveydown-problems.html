<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>surveydown problems</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/maple-mono@5.2.5/index.min.css">
<style>
  @font-face {
    font-family: 'TsangerJinKai';
    src: url('https://raw.githubusercontent.com/pingfan-hu/resources/main/fonts/TsangerJinKai02-W04.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'TsangerJinKai', Georgia, serif;
    color: #564232;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    display: flex;
    align-items: stretch;
    gap: 32px;
    width: 100%;
    max-width: 860px;
  }

  .card {
    flex: 1;
    border: 2px solid #FFB84D;
    border-radius: 14px;
    padding: 28px 28px 26px;
    background: #2C3E50;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(212, 95, 71, 0.25);
  }

  .card-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: rgba(212, 95, 71, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon svg {
    width: 30px;
    height: 30px;
    color: #FFB84D;
    stroke-width: 1.8;
  }

  .card-title {
    font-size: 1.5em;
    font-weight: bold;
    color: #FFB84D;
    text-align: center;
    line-height: 1.25;
  }

  .card-divider {
    width: 55%;
    height: 1.5px;
    background: #FFB84D;
    border-radius: 2px;
    opacity: 0.35;
  }

  .card-desc {
    font-size: 1.25em;
    line-height: 1.55;
    text-align: center;
    color: #F8F7F0;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Problem 1: Code-only, no GUI -->
  <div class="card">
    <div class="card-icon">
      <i data-lucide="terminal"></i>
    </div>
    <div class="card-title">Code-Only Interface</div>
    <div class="card-divider"></div>
    <div class="card-desc">
      No GUI — not everyone is comfortable working purely in code.
    </div>
  </div>

  <!-- Problem 2: Unclear workflow -->
  <div class="card">
    <div class="card-icon">
      <i data-lucide="help-circle"></i>
    </div>
    <div class="card-title">Steep Learning Curve</div>
    <div class="card-divider"></div>
    <div class="card-desc">
      The survey pipeline is not obvious — it takes time to learn.
    </div>
  </div>

</div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
